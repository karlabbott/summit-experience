<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Hat Summit Sessions — Karl Abbott</title>
    <meta name="description" content="Interactive session experiences from Karl Abbott's Red Hat Summit presentations.">
    <meta name="theme-color" content="#0d1117">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #8b949e; margin-bottom: 2rem; }
        .years { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 400px; }
        a {
            display: block;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            color: #e6edf3;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: border-color 0.2s, transform 0.2s;
        }
        a:hover { border-color: #58a6ff; transform: translateY(-2px); }
        a span { display: block; font-size: 0.82rem; font-weight: 400; color: #8b949e; margin-top: 0.3rem; }
        .footer { margin-top: 3rem; font-size: 0.8rem; color: #6e7681; }
    </style>
    <script>
        // If only one year exists, redirect automatically
        // Remove this when 2027 is added
        window.location.href = '/2026/';
    </script>
</head>
<body>
    <h1>Red Hat Summit Sessions</h1>
    <p>Karl Abbott — Interactive session experiences</p>
    <div class="years">
        <a href="/2026/">
            2026 — Modern RHEL Operations on Azure with Copilot
            <span>One prompt. Two blank VMs. A live app in minutes.</span>
        </a>
    </div>
    <div class="footer">Karl Abbott · Product Manager, Microsoft</div>
</body>
</html>
